qlib_init:
    provider_uri: "~/.qlib/qlib_data/upbit_data"
    region: us  # defaults only; crypto specifics overridden in exchange_kwargs
market: &market all
benchmark: &benchmark KRW-BTC
data_handler_config: &data_handler_config
    start_time: 2018-01-01
    end_time: 2026-06-30
    fit_start_time: 2018-01-01
    fit_end_time: 2023-12-31
    instruments: *market
port_analysis_config: &port_analysis_config
    strategy:
        class: TopkDropoutStrategy
        module_path: qlib.contrib.strategy
        kwargs:
            signal: <PRED>
            topk: 3
            n_drop: 1
    backtest:
        start_time: 2025-01-01
        end_time: 2026-06-30
        account: 100000000
        benchmark: *benchmark
        exchange_kwargs:
            limit_threshold: null   # no daily price limit in crypto
            deal_price: close
            open_cost: 0.0005       # Upbit KRW market fee 0.05%
            close_cost: 0.0005
            min_cost: 0
            trade_unit: null        # fractional trading
task:
    model:
        class: LGBModel
        module_path: qlib.contrib.model.gbdt
        kwargs:
            loss: mse
            learning_rate: 0.1
            max_depth: 6
            num_leaves: 64
            num_threads: 8
    dataset:
        class: DatasetH
        module_path: qlib.data.dataset
        kwargs:
            handler:
                class: Alpha158
                module_path: qlib.contrib.data.handler
                kwargs: *data_handler_config
            segments:
                train: [2018-01-01, 2023-12-31]
                valid: [2024-01-01, 2024-12-31]
                test: [2025-01-01, 2026-06-30]
    record:
        - class: SignalRecord
          module_path: qlib.workflow.record_temp
          kwargs:
            model: <MODEL>
            dataset: <DATASET>
        - class: SigAnaRecord
          module_path: qlib.workflow.record_temp
          kwargs:
            ana_long_short: False
            ann_scaler: 365   # crypto trades every day
        - class: PortAnaRecord
          module_path: qlib.workflow.record_temp
          kwargs:
            config: *port_analysis_config
